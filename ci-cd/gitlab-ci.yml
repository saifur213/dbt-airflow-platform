stages:
  - validate
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  AIRFLOW_VERSION: "2.9.2"

# ── Validate ──────────────────────────────────────────────────────────────────

lint:airflow:
  stage: validate
  image: python:3.11-slim
  script:
    - pip install apache-airflow==$AIRFLOW_VERSION
    - python -m py_compile airflow/dags/**/*.py
    - airflow dags list  # Ensures no import errors

lint:dbt:
  stage: validate
  image: ghcr.io/dbt-labs/dbt-snowflake:1.8.0
  script:
    - cd dbt/analytics
    - dbt debug --profiles-dir . --target ci
    - dbt compile --profiles-dir . --target ci

# ── Test ──────────────────────────────────────────────────────────────────────

test:dbt:
  stage: test
  image: ghcr.io/dbt-labs/dbt-snowflake:1.8.0
  environment: dev
  script:
    - cd dbt/analytics
    - dbt test --profiles-dir . --target ci --store-failures
  artifacts:
    when: always
    paths:
      - dbt/analytics/target/

test:airflow:
  stage: test
  image: python:3.11-slim
  script:
    - pip install pytest apache-airflow==$AIRFLOW_VERSION
    - pytest tests/airflow_tests/ -v --tb=short

# ── Build ─────────────────────────────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE airflow/
    - docker push $DOCKER_IMAGE
  only:
    - main
    - /^release\/.*$/

# ── Deploy ────────────────────────────────────────────────────────────────────

deploy:prod:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://airflow.tsl.com
  script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | ssh-add -
    - ssh -o StrictHostKeyChecking=no deploy@$PROD_HOST "cd /opt/airflow-dbt && bash ci-cd/deploy.sh $CI_COMMIT_SHORT_SHA"
  only:
    - main
  when: manual  # Always require manual gate for production