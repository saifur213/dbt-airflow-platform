analytics:
  target: postgres_dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: ACCOUNTADMIN
      database: DEV
      warehouse: COMPUTE_WH
      schema: PUBLIC
      threads: 4
      client_session_keep_alive: False
      query_tag: dbt_dev

    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: ACCOUNTADMIN
      database: PROD
      warehouse: COMPUTE_WH
      schema: PUBLIC
      threads: 8
      client_session_keep_alive: False
      query_tag: dbt_prod

    postgres_dev:
      type: postgres
      host: "host.docker.internal"
      # host: "localhost"
      user: "{{ env_var('TARGET_POSTGRES_USER') }}"
      password: "{{ env_var('TARGET_POSTGRES_PASSWORD') }}"
      port: "{{ env_var('TARGET_POSTGRES_PORT') | int }}"
      dbname: "{{ env_var('TARGET_POSTGRES_DB') }}"
      schema: "{{ env_var('TARGET_POSTGRES_SCHEMA') }}"
      threads: 4