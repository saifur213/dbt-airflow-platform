version: 2

sources:
  - name: raw
    schema: "{{ target.schema }}"
    description: "Raw data loaded from Postgres by Airflow"
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 24, period: hour}
    loaded_at_field: _extracted_at
    tables:
      - name: orders
        description: "Transactional orders from source system"
        columns:
          - name: order_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: order_total
            tests: [not_null]
      - name: customers
        description: "Customer Information from source system"