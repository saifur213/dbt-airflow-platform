x-airflow-common: &airflow-common
  image: airflow-dbt:latest
  build:
    context: ../airflow
    dockerfile: Dockerfile
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
    - ../dbt:/opt/dbt
  depends_on:
    airflow-postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  airflow-postgres:
    image: postgres:15-alpine
    mem_limit: 1g
    ports:
     - "5433:5432"
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER} -d ${AIRFLOW_POSTGRES_DB}"]
      interval: 10s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    restart: always

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    mem_limit: 1g
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    mem_limit: 1g
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    mem_limit: 1.5g
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
    - -c
    - |
      airflow db upgrade && \
      airflow users create \
        --username ${AIRFLOW_ADMIN_USERNAME} \
        --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
        --lastname ${AIRFLOW_ADMIN_LASTNAME} \
        --role Admin \
        --email ${AIRFLOW_ADMIN_EMAIL} \
        --password ${AIRFLOW_ADMIN_PASSWORD} || true
    restart: on-failure

  flower:
    <<: *airflow-common
    command: celery flower
    ports:
      - "5555:5555"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/airflow.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - airflow-webserver
    restart: always

  dbt-docs:
    <<: *airflow-common
    command: >
      bash -c "
        cd /opt/dbt/analytics &&
        python -m http.server 8082 --directory target
      "
    ports:
      - "8082:8082"

  # dbt-docs:
  #   <<: *airflow-common
